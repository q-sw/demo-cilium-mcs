---
# --- Setup Common Dependencies ---
- name: Prepare all nodes
  hosts: all
  roles:
    - common

# --- Cluster Paris ---
- name: Initialize Control Plane (Paris)
  hosts: cluster_paris:&k8s_role_control_plane
  roles:
    - control-plane

- name: Join Workers (Paris)
  hosts: cluster_paris:&k8s_role_worker
  tasks:
    - name: Retrieve join command
      set_fact:
        join_command: "{{ hostvars[groups['cluster_paris'] | intersect(groups['k8s_role_control_plane']) | first]['join_command'] }}"

    - name: Join cluster
      command: "{{ join_command }}"
      become: true
      args:
        creates: /etc/kubernetes/kubelet.conf

# --- Cluster Amsterdam ---
- name: Initialize Control Plane (Amsterdam)
  hosts: cluster_amsterdam:&k8s_role_control_plane
  roles:
    - control-plane

- name: Join Workers (Amsterdam)
  hosts: cluster_amsterdam:&k8s_role_worker
  tasks:
    - name: Retrieve join command
      set_fact:
        join_command: "{{ hostvars[groups['cluster_amsterdam'] | intersect(groups['k8s_role_control_plane']) | first]['join_command'] }}"

    - name: Join cluster
      command: "{{ join_command }}"
      become: true
      args:
        creates: /etc/kubernetes/kubelet.conf
