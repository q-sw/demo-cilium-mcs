---
cluster:
  name: cluster-amsterdam
  id: 2

ipam:
  operator:
    clusterPoolIPv4PodCIDRList:
      - 10.201.0.0/16

kubeProxyReplacement: true
k8sServiceHost: cp.amsterdam.internal
k8sServicePort: 6443

hubble:
  relay:
    enabled: true
  ui:
    enabled: true
  tls:
    auto:
      method: cronJob
