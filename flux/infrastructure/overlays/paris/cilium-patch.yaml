apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: flux-system
spec:
  values:
    cluster:
      name: cluster-paris
      id: 1
    k8sServiceHost: cp.paris.internal
    ipam:
      operator:
        clusterPoolIPv4PodCIDRList:
          - 10.200.0.0/16
    clustermesh:
      useAPIServer: true
      config:
        enabled: true
        domain: clustermesh.internal
        clusters:
          cluster-paris:
            address: cp.paris.clustermesh.internal
            port: 32379
          cluster-newyork:
            address: cp.newyork.clustermesh.internal
            port: 32379
      apiserver:
        # FIXME: If you need HA increase this to 2 or more
        replicas: 1
        tls:
          authMode: cluster
          auto:
            method: cronJob
          server:
            extraDnsNames:
              - "*.clustermesh.internal"
              - cp.paris.clustermesh.internal
      mcsapi:
        enabled: true
        corednsAutoConfigure:
          enabled: true
