apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: flux-system
spec:
  values:
    cluster:
      name: cluster-amsterdam
      id: 2
    k8sServiceHost: cp.amsterdam.internal
    ipam:
      operator:
        clusterPoolIPv4PodCIDRList:
          - 10.201.0.0/16
    clustermesh:
      useAPIServer: true
      config:
        enabled: true
        domain: clustermesh.internal
        clusters:
          cluster-paris:
            address: cp.paris.clustermesh.internal
            port: 32379
          cluster-amsterdam:
            address: cp.amsterdam.clustermesh.internal
            port: 32379
      apiserver:
        kvstoremesh:
          enable: true
        # FIXME: If you need HA increase this to 2 or more
        replicas: 1
        service:
          nodePort: 32379
        tls:
          authMode: cluster
          auto:
            method: cronJob
          server:
            extraDnsNames:
              - "*.clustermesh.internal"
              - cp.amsterdam.clustermesh.internal
      mcsapi:
        enabled: true
        corednsAutoConfigure:
          enabled: true
